services:
  db:
    image: postgres:16-alpine
    container_name: yandex-geobase-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docs/000_full_database_schema.sql:/docker-entrypoint-initdb.d/000_full_database_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: yandex-geobase-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # важно: внутри docker-compose сети Postgres доступен как "db"
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:8000"

volumes:
  pgdata:
