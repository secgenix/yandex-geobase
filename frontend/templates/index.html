<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yandex GeoBase</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <style>
        .header {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-nav {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-nav a,
        .header-nav button {
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .header-nav a:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .header-nav button {
            background: #ff6b00;
        }

        .header-nav button:hover {
            background: #e55a00;
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="header-title">
                <h1>Yandex GeoBase</h1>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Поиск объектов...">
                    <button id="searchBtn">Найти</button>
                </div>
            </div>
            <div class="header-nav" id="headerNav">
                <a href="login.html">Вход</a>
                <a href="register.html">Регистрация</a>
            </div>
        </header>

        <aside class="filters">
            <h3>Фильтры</h3>
            <div class="filter-group">
                <label for="categoryFilter">Категория</label>
                <select id="categoryFilter">
                    <option value="">Все</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="organizationFilter">Организация</label>
                <select id="organizationFilter">
                    <option value="">Все</option>
                </select>
            </div>
            <button id="applyFilters">Применить</button>
            <button id="clearFilters">Очистить</button>
            <aside class="objects-list">
                <h3>Список объектов</h3>
                <ul id="objectsList"></ul>
            </aside>
        </aside>

        <main class="main">
            <div id="map" class="map" style="height: 100%;"></div>
            <div id="mapContextMenu" class="context-menu" style="display: none;">
                <ul>
                    <li><a href="#" data-action="add-marker">Установить метку</a></li>
                </ul>
            </div>
            <div id="loading" class="loading" style="display: none;">Загрузка...</div>
            <div id="noResults" class="no-results" style="display: none;">Ничего не найдено</div>
            <aside class="object-card" id="objectCard" aria-hidden="true">
                <button id="closeCard" type="button" aria-label="Закрыть карточку">&times;</button>
                <div class="object-card__media" id="cardImageContainer" aria-hidden="true">
                    <img id="cardImage" src="" alt="Изображение объекта">
                    <div class="object-card__placeholder" id="cardImagePlaceholder">Изображение не добавлено</div>
                </div>
                <div class="object-card__content">
                    <h3 id="cardName"></h3>
                    <dl class="object-card__details">
                        <div>
                            <dt>Адрес</dt>
                            <dd id="cardAddress"></dd>
                        </div>
                        <div>
                            <dt>Категория</dt>
                            <dd id="cardCategory"></dd>
                        </div>
                        <div>
                            <dt>Организация</dt>
                            <dd id="cardOrganization"></dd>
                        </div>
                        <div>
                            <dt>Описание</dt>
                            <dd id="cardDescription"></dd>
                        </div>
                    </dl>
                </div>
            </aside>
        </main>

        <div id="markerModal" class="marker-modal" style="display: none;">
            <div class="marker-modal__dialog">
                <div class="marker-modal__header">
                    <h3>Добавить метку</h3>
                    <button type="button" id="closeMarkerModal" aria-label="Закрыть">&times;</button>
                </div>
                <form id="markerForm" class="marker-form">
                    <div class="filter-group">
                        <label for="markerName">Название</label>
                        <input type="text" id="markerName" name="name" required maxlength="255"
                            placeholder="Название метки">
                    </div>
                    <div class="filter-group">
                        <label for="markerOrganization">Организация</label>
                        <select id="markerOrganization" name="organization_id">
                            <option value="">Не выбрана</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="markerCategory">Категория</label>
                        <select id="markerCategory" name="category_id">
                            <option value="">Не выбрана</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="markerDescription">Описание</label>
                        <textarea id="markerDescription" name="description" placeholder="Описание метки"></textarea>
                    </div>
                    <div class="filter-group">
                        <label for="markerImage">Изображение</label>
                        <input type="file" id="markerImage" name="image" accept="image/*"
                            placeholder="Выберите изображение">
                        <div id="imagePreview" class="image-preview" style="display: none;">
                            <img id="previewImg" src="" alt="Превью изображения">
                            <button type="button" id="removeImage">Удалить</button>
                        </div>
                    </div>
                    <div class="filter-group">
                        <label for="markerAddress">Адрес</label>
                        <input type="text" id="markerAddress" name="address"
                            placeholder="Адрес (заполнится автоматически при клике на дом)">
                        <small style="color: #666;">При клике на дом адрес подставится автоматически</small>
                    </div>
                    <div class="marker-modal__actions">
                        <button type="button" id="cancelMarkerModal">Отмена</button>
                        <button type="submit">Сохранить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://api-maps.yandex.ru/2.1/?apikey={{ api_key }}&lang=ru_RU"></script>
    <script src="../static/js/script.js"></script>
</body>

</html>
